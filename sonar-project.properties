sonar.projectKey=core-fe
sonar.projectName=core-fe
sonar.projectVersion=1.0.0-alpha.0

# SCM (git-blame) sensor disabled: the dockerized scanner runs JGit blame over a
# bind-mounted repo, which is pathologically slow on macOS Docker Desktop and can
# hang the scan for many minutes. The local gate counts TOTAL unresolved issues +
# hotspots (api/issues/search?resolved=false), which never use SCM data — so
# author/new-code attribution is the only thing dropped, and the verdict is
# unchanged. Re-enable if a hosted SonarQube with a new-code policy is adopted.
sonar.scm.disabled=true

# Source and test paths — only src/ is indexed; root tests/ (Playwright e2e,
# k6 load, vitest utils) is dev tooling run with trusted inputs and stays out
# of analysis entirely, same rationale as core-be excluding src/tests + tooling.
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Exclusions — scope analysis to the deployed application surface (src/ runtime).
# Placeholder UI modules (*.placeholder-data.ts, *.fixtures.ts) are REPLACE_WITH_API
# stubs with static seed data — not production API paths.
#
# Tests are part of the repo but not the deployed runtime, so they are excluded
# from analysis. `sonar.exclusions` only filters the MAIN file set — files
# classified as tests (via `sonar.test.inclusions` above) must ALSO be listed in
# `sonar.test.exclusions`, otherwise test-only rules keep reporting against
# non-deployed code (e.g. S2699 "add an assertion" on helper-based assertions).
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/*.d.ts,\
  **/*.css,\
  src/**/*.placeholder-data.ts,\
  src/**/*.fixtures.ts,\
  **/__tests__/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx

sonar.test.exclusions=\
  **/__tests__/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx

# Rule scoping (in-repo, reviewable — no server-side quality-profile edits):
#  e1 S6759 "props read-only": React props are immutable by convention; wrapping
#     every component (incl. vendored shadcn primitives) in Readonly<> is churn
#     with no safety gain — TS already prevents prop mutation at call sites.
#  e2 S6819 "<dialog> over role=dialog": CommandPalette is a custom overlay that
#     owns focus/escape handling; the native <dialog> element has different
#     open/close + top-layer semantics.
#  e3 S6819 "<input type=radio> over role=radio": theme picker is a WAI-ARIA
#     radiogroup composite of styled buttons; verified by axe in e2e.
#  e4 S5256 "table needs headers": headless shadcn primitive — headers are the
#     consumer's responsibility; rendered tables are axe-checked in e2e.
#  e5–e8 S6819 "native element over ARIA role": Appearance/Language pickers are
#     WAI-ARIA radiogroup/dialog composites of styled buttons (same rationale as
#     e2/e3); HighlightsCarousel tablist + AccountBillingPanel grouping and the
#     vendored ui/ primitives (carousel region/group, input-otp separator) follow
#     the upstream APG patterns; all are axe-checked in e2e.
#  e9 S6819 "<progress> over role=progressbar": RouteProgressBar is a 2px
#     indeterminate top bar; the native <progress> element cannot be styled to
#     match and its determinate semantics don't apply.
#  e10 S6478 "no nested components": TanStack Table `cell:` renderers and
#     react-error-boundary `fallbackRender` are render callbacks by API design
#     (memoized column defs / boundary props), not remount-sensitive component
#     definitions; ui/calendar.tsx is the vendored shadcn day-picker wiring.
#  e11 S6481 "memoize context value": vendored shadcn carousel primitive.
#  e14 S1874 "deprecated API": lucide deprecated ALL brand icons (Github) with
#     no replacement; the GitHub OAuth button needs the mark. Revisit if the
#     icon strategy moves brand marks to simple-icons.
#  e15/e16 S2068 "hard-coded password" hotspots: the flagged strings are i18n
#     KEYS ('common.password', 'validation.passwordRequired') and data-testid
#     values ('auth-password') — lookup identifiers, not credentials. Real
#     secret detection is covered by gitleaks (pre-commit + CI lane).
# CSS is excluded above: Tailwind v4 css-first at-rules (@theme, @utility, …)
# are unknown to Sonar's css analyzer and every hit is a false positive.
