# Local SonarQube instance for code quality analysis.
# Usage:
#   pnpm sonar:up                                       # start SonarQube
#   pnpm sonar:scan                                     # scan + quality gate
#   pnpm sonar:down                                     # stop (keep data)
#   pnpm sonar:reset                                    # teardown incl. volumes
#
# Dashboard: http://localhost:9001  (admin / admin on first login)
#
# core-fe's SonarQube runs on host port 9001 so it can coexist with core-be's
# local SonarQube (host port 9000) — the two run as separate containers/projects.
# SONAR_HOST_PORT (default 9001) overrides the host port if needed.

services:
  sonarqube:
    image: sonarqube:25.5.0.107428-community
    container_name: core-fe-sonarqube
    ports:
      # Host 9001 so core-fe's SonarQube can run alongside core-be's (host 9000).
      # The container still listens on 9000 internally (healthcheck below is unchanged).
      - '${SONAR_HOST_PORT:-9001}:9000'
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: 'true'
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    healthcheck:
      test:
        ['CMD-SHELL', 'wget -qO- http://localhost:9000/api/system/status | grep -q "UP"']
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 120s

  # The scanner targets the HOST port (host.docker.internal:9000), not the
  # compose-network hostname, so it reaches whichever server owns :9000 —
  # this repo's or core-be's. No depends_on: the gate script (sonar-gate.mjs)
  # guarantees a healthy server before invoking the scanner.
  scanner:
    image: sonarsource/sonar-scanner-cli:11
    container_name: core-fe-sonar-scanner
    profiles: ['scan']
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - .:/usr/src
    working_dir: /usr/src
    environment:
      SONAR_HOST_URL: http://host.docker.internal:9001
      SONAR_TOKEN: ${SONAR_TOKEN:-}
    command: >
      sonar-scanner
        -Dsonar.projectKey=core-fe
        -Dsonar.projectName="core-fe"
        -Dsonar.projectVersion=1.0.0-alpha.0
        -Dsonar.host.url=http://host.docker.internal:9001
        -Dsonar.token=${SONAR_TOKEN:-admin:admin@}

volumes:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
