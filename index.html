<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Core Admin — Enterprise multi-tenant admin dashboard"
    />
    <link rel="preconnect" href="https://us.i.posthog.com" crossorigin />
    <link rel="dns-prefetch" href="https://us.i.posthog.com" />
    <link rel="dns-prefetch" href="https://o0.ingest.sentry.io" />
    <meta name="theme-color" content="#0a0a0a" />
    <!-- frame-ancestors is intentionally absent here: browsers ignore it in
         meta CSPs (header-only directive). It ships as a real header from
         public/_headers, alongside X-Frame-Options: DENY. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self';
             script-src 'self';
             style-src 'self' 'unsafe-inline';
             connect-src 'self'<!-- CSP_API_CONNECT_SRC -->
               https://*.ingest.sentry.io
               https://*.sentry.io
               https://us.i.posthog.com
               https://us-assets.i.posthog.com
               https://api.pwnedpasswords.com;
             img-src 'self' data: blob:;
             font-src 'self';
             worker-src 'self';
             object-src 'none';
             base-uri 'self';
             form-action 'self';
             upgrade-insecure-requests;"
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Core Admin</title>
    <!-- Runtime config from Docker entrypoint (noop in dev) -->
    <script src="/config.js" defer></script>
    <!-- Prevent theme FOUC: apply dark class before React hydrates -->
    <script src="/theme-init.js"></script>
    <!-- Boot splash: a spinner identical to the React FullPageSpinner so the
         HTML→React handoff is seamless. theme-init.js sets `.dark` first, so the
         bg + spinner colour are already theme-correct (no white flash, no
         text→circle jump). The whole #root subtree is replaced when React mounts. -->
    <style>
      html {
        background: oklch(1 0 0);
      }
      html.dark {
        background: oklch(0.145 0 0);
      }
      .app-splash-spinner {
        color: oklch(0.205 0 0);
        animation: app-splash-spin 1s linear infinite;
      }
      html.dark .app-splash-spinner {
        color: oklch(0.922 0 0);
      }
      @keyframes app-splash-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .app-splash-spinner {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <noscript>
      <p style="padding: 2rem; text-align: center">
        JavaScript is required to run this application.
      </p>
    </noscript>
    <div id="root">
      <!-- Loading splash (replaced by React on mount). Centering lives on this
           inner wrapper — never on #root — so it cannot leak into the mounted
           app and collapse the layout width. -->
      <div
        style="
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
        "
      >
        <svg
          class="app-splash-spinner"
          width="32"
          height="32"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          role="status"
          aria-label="Loading"
        >
          <path d="M21 12a9 9 0 1 1-6.219-8.56" />
        </svg>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
