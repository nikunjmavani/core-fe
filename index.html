<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Core Admin — Enterprise multi-tenant admin dashboard"
    />
    <link rel="preconnect" href="https://us.i.posthog.com" crossorigin />
    <link rel="dns-prefetch" href="https://us.i.posthog.com" />
    <link rel="dns-prefetch" href="https://o0.ingest.sentry.io" />
    <meta name="theme-color" content="#0a0a0a" />
    <!-- frame-ancestors is intentionally absent here: browsers ignore it in
         meta CSPs (header-only directive). It ships as a real header from
         public/_headers, alongside X-Frame-Options: DENY. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self';
             script-src 'self';
             style-src 'self' 'unsafe-inline';
             connect-src 'self'<!-- CSP_API_CONNECT_SRC -->
               https://*.ingest.sentry.io
               https://*.sentry.io
               https://us.i.posthog.com
               https://us-assets.i.posthog.com;
             img-src 'self' data: blob:;
             font-src 'self';
             worker-src 'self';
             object-src 'none';
             base-uri 'self';
             form-action 'self';
             upgrade-insecure-requests;"
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Core Admin</title>
    <!-- Runtime config from Docker entrypoint (noop in dev) -->
    <script src="/config.js" defer></script>
    <!-- Prevent theme FOUC: apply dark class before React hydrates -->
    <script src="/theme-init.js"></script>
  </head>
  <body>
    <noscript>
      <p style="padding: 2rem; text-align: center">
        JavaScript is required to run this application.
      </p>
    </noscript>
    <div id="root">
      <!-- Loading splash (replaced by React on mount). Centering lives on this
           inner wrapper — never on #root — so it cannot leak into the mounted
           app and collapse the layout width. -->
      <div
        style="
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
        "
      >
        <p style="color: #71717a; font-size: 0.875rem">Loading…</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
