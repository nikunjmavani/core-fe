<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Core Admin — Enterprise multi-tenant admin dashboard"
    />
    <link rel="preconnect" href="https://us.i.posthog.com" crossorigin />
    <link rel="dns-prefetch" href="https://us.i.posthog.com" />
    <link rel="dns-prefetch" href="https://o0.ingest.sentry.io" />
    <meta name="theme-color" content="#0a0a0a" />
    <!-- frame-ancestors is intentionally absent here: browsers ignore it in
         meta CSPs (header-only directive). It ships as a real header from
         public/_headers, alongside X-Frame-Options: DENY. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self';
             script-src 'self';
             style-src 'self' 'unsafe-inline';
             connect-src 'self'<!-- CSP_API_CONNECT_SRC -->
               https://*.ingest.sentry.io
               https://*.sentry.io
               https://us.i.posthog.com
               https://us-assets.i.posthog.com
               https://api.pwnedpasswords.com;
             img-src 'self' data: blob:;
             font-src 'self';
             worker-src 'self';
             object-src 'none';
             base-uri 'self';
             form-action 'self';
             upgrade-insecure-requests;"
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Core Admin</title>
    <!-- Runtime config from Docker entrypoint (noop in dev) -->
    <script src="/config.js" defer></script>
    <!-- Prevent theme FOUC: apply dark class before React hydrates -->
    <script src="/theme-init.js"></script>
    <!-- Branded boot loader: mirrors the React FullPageSpinner so the HTML→React
         handoff is ONE continuous screen. theme-init.js sets `.dark` first, so the
         bg + colours are theme-correct (no white flash). A breathing pulse (not a
         rotation) means the swap to React shows no visible animation restart.
         `position: fixed` can't introduce a scrollbar. Replaced when React mounts. -->
    <style>
      html {
        background: oklch(1 0 0);
      }
      html.dark {
        background: oklch(0.145 0 0);
      }
      .app-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        overflow: hidden;
      }
      .app-splash-brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }
      .app-splash-mark {
        width: 3rem;
        height: 3rem;
        border-radius: 1rem;
        background: oklch(0.205 0 0);
        animation: app-splash-breathe 1.6s ease-in-out infinite;
      }
      html.dark .app-splash-mark {
        background: oklch(0.922 0 0);
      }
      .app-splash-name {
        font:
          600 1rem/1.2 'Inter',
          ui-sans-serif,
          system-ui,
          sans-serif;
        letter-spacing: -0.01em;
        color: oklch(0.145 0 0);
      }
      html.dark .app-splash-name {
        color: oklch(0.985 0 0);
      }
      .app-splash-track {
        width: 8rem;
        height: 0.25rem;
        border-radius: 9999px;
        background: oklch(0.97 0 0);
        overflow: hidden;
      }
      html.dark .app-splash-track {
        background: oklch(0.269 0 0);
      }
      .app-splash-bar {
        width: 50%;
        height: 100%;
        border-radius: 9999px;
        background: oklch(0.205 0 0);
        animation: app-splash-progress 1.1s ease-in-out infinite;
      }
      html.dark .app-splash-bar {
        background: oklch(0.922 0 0);
      }
      @keyframes app-splash-breathe {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(0.85);
          opacity: 0.55;
        }
      }
      @keyframes app-splash-progress {
        from {
          transform: translateX(-100%);
        }
        to {
          transform: translateX(350%);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .app-splash-mark,
        .app-splash-bar {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <noscript>
      <p style="padding: 2rem; text-align: center">
        JavaScript is required to run this application.
      </p>
    </noscript>
    <div id="root">
      <!-- Branded boot loader (replaced by React on mount) — mirrors the React
           FullPageSpinner: a breathing brand tile + wordmark + indeterminate bar. -->
      <div class="app-splash" role="status" aria-label="Loading">
        <div class="app-splash-brand">
          <div class="app-splash-mark"></div>
          <span class="app-splash-name">Core Admin</span>
        </div>
        <div class="app-splash-track"><div class="app-splash-bar"></div></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
