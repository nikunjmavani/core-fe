name: Post-release back-merge

# Runs after every stable GitHub Release published on main (non-prerelease).
# Post-merge CI also dispatches this workflow explicitly because releases created
# with GITHUB_TOKEN do not reliably fan out to release-triggered workflows.
# Opens a PR `release/backmerge-v<version>` -> `dev` that:
#   1. Merges main into dev (brings any direct-on-main commits like hotfixes).
#   2. Reseeds `.github/release-please/manifest.dev.json` and `package.json`
#      to the next non-decreasing prerelease window (default rule: bump minor,
#      but keep the current dev seed when dev is already ahead; override via
#      workflow_dispatch input).
#
# Why this exists: release-please's `node` release-type only honors
# `prerelease: true` when the manifest already contains a `-dev.N` suffix.
# Without this reseed, dev would keep emitting `-dev.N` against a base
# version main has already shipped.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Stable version that triggered the back-merge (e.g. 3.0.0)'
        required: true
        type: string
      next_seed:
        description: 'Override next dev seed (e.g. 3.2.0-dev.0). Empty = max(current dev seed, next minor).'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: post-release-backmerge-${{ github.event.release.tag_name || inputs.version }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: ${{ vars.FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 || 'true' }}

jobs:
  open-backmerge-pr:
    name: Open back-merge PR
    # Only fire for stable releases (non-prerelease and tag without `-dev.`).
    # Prereleases on dev (`vX.Y.Z-dev.N`) must not trigger this workflow.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.release.prerelease == false &&
        !contains(github.event.release.tag_name, '-dev.')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout dev
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Resolve version and next dev seed
        id: versions
        env:
          GH_INPUT_VERSION: ${{ inputs.version }}
          GH_INPUT_NEXT_SEED: ${{ inputs.next_seed }}
          GH_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if [ -n "${GH_INPUT_VERSION:-}" ]; then
            version="${GH_INPUT_VERSION}"
          else
            version="${GH_TAG#v}"
          fi
          if [ -z "${version}" ]; then
            echo "::error::Could not determine released version."
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

          current_dev_seed="$(jq -r '."." // empty' .github/release-please/manifest.dev.json)"
          if [ -z "${current_dev_seed}" ]; then
            echo "::error::Could not read current dev seed from manifest.dev.json."
            exit 1
          fi

          version_greater_or_equal() {
            local left="$1"
            local right="$2"
            local left_base="${left%%-*}"
            local right_base="${right%%-*}"
            local left_pre=""
            local right_pre=""
            if [[ "${left}" == *-* ]]; then left_pre="${left#*-}"; fi
            if [[ "${right}" == *-* ]]; then right_pre="${right#*-}"; fi

            local left_major left_minor left_patch
            local right_major right_minor right_patch
            IFS=. read -r left_major left_minor left_patch <<< "${left_base}"
            IFS=. read -r right_major right_minor right_patch <<< "${right_base}"

            for component in major minor patch; do
              local left_value right_value
              case "${component}" in
                major) left_value="${left_major}"; right_value="${right_major}" ;;
                minor) left_value="${left_minor}"; right_value="${right_minor}" ;;
                patch) left_value="${left_patch}"; right_value="${right_patch}" ;;
              esac
              if (( left_value > right_value )); then return 0; fi
              if (( left_value < right_value )); then return 1; fi
            done

            if [ "${left_pre}" = "${right_pre}" ]; then return 0; fi
            if [ -z "${left_pre}" ]; then return 0; fi
            if [ -z "${right_pre}" ]; then return 1; fi

            local left_pre_number="${left_pre##*.}"
            local right_pre_number="${right_pre##*.}"
            if [[ "${left_pre_number}" =~ ^[0-9]+$ ]] && [[ "${right_pre_number}" =~ ^[0-9]+$ ]]; then
              (( left_pre_number >= right_pre_number ))
              return
            fi

            [[ "${left_pre}" > "${right_pre}" || "${left_pre}" = "${right_pre}" ]]
          }

          if [ -n "${GH_INPUT_NEXT_SEED:-}" ]; then
            next_seed="${GH_INPUT_NEXT_SEED}"
          else
            major="${version%%.*}"
            rest="${version#*.}"
            minor="${rest%%.*}"
            if ! [[ "${major}" =~ ^[0-9]+$ ]] || ! [[ "${minor}" =~ ^[0-9]+$ ]]; then
              echo "::error::Released version '${version}' is not plain MAJOR.MINOR.PATCH."
              exit 1
            fi
            next_minor=$((minor + 1))
            default_seed="${major}.${next_minor}.0-dev.0"
            if version_greater_or_equal "${current_dev_seed}" "${default_seed}"; then
              next_seed="${current_dev_seed}"
            else
              next_seed="${default_seed}"
            fi
          fi
          if ! [[ "${next_seed}" =~ ^[0-9]+\.[0-9]+\.[0-9]+-dev\.[0-9]+$ ]]; then
            echo "::error::Next dev seed '${next_seed}' must look like MAJOR.MINOR.PATCH-dev.N."
            exit 1
          fi
          echo "next_seed=${next_seed}" >> "$GITHUB_OUTPUT"
          echo "Stable version:   ${version}"
          echo "Current dev seed: ${current_dev_seed}"
          echo "Next dev seed:    ${next_seed}"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create back-merge branch and reseed dev version files
        id: branch
        env:
          VERSION: ${{ steps.versions.outputs.version }}
          NEXT_SEED: ${{ steps.versions.outputs.next_seed }}
        run: |
          set -euo pipefail
          branch="release/backmerge-v${VERSION}"
          echo "branch=${branch}" >> "$GITHUB_OUTPUT"

          git fetch origin main
          git checkout -B "${branch}" origin/dev

          if ! git merge --no-edit --no-ff origin/main \
              -m "chore(release): merge main v${VERSION} into dev"; then
            echo "::error::Automatic merge of main into dev failed. Resolve conflicts manually, then re-run this workflow via workflow_dispatch with the desired version."
            git merge --abort || true
            exit 1
          fi

          updated_manifest="$(jq --arg version "${NEXT_SEED}" '."." = $version' .github/release-please/manifest.dev.json)"
          printf '%s\n' "${updated_manifest}" > .github/release-please/manifest.dev.json
          updated_package="$(jq --arg version "${NEXT_SEED}" '.version = $version' package.json)"
          printf '%s\n' "${updated_package}" > package.json

          git add .github/release-please/manifest.dev.json package.json
          if git diff --cached --quiet; then
            echo "Dev version files already seeded to ${NEXT_SEED}."
          else
            git commit -m "chore(release): seed dev to ${NEXT_SEED} after v${VERSION}"
          fi

          git push --force-with-lease origin "${branch}"

      - name: Open or update back-merge PR
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          VERSION: ${{ steps.versions.outputs.version }}
          NEXT_SEED: ${{ steps.versions.outputs.next_seed }}
          BRANCH: ${{ steps.branch.outputs.branch }}
        run: |
          set -euo pipefail
          existing="$(
            gh pr list \
              --repo "${GH_REPOSITORY}" \
              --state open \
              --head "${BRANCH}" \
              --base dev \
              --json number \
              --jq '.[0].number // empty'
          )"

          body="$(cat <<EOF
          Automated back-merge after stable release v${VERSION}.

          Reseeds \`.github/release-please/manifest.dev.json\` and \`package.json\`
          to \`${NEXT_SEED}\` so the dev channel continues emitting \`-dev.N\`
          prereleases on a base version higher than the one main just shipped.

          To override the next seed, re-run the \`Post-release back-merge\` workflow
          via workflow_dispatch with the \`next_seed\` input.
          EOF
          )"

          if [ -n "${existing}" ]; then
            echo "Back-merge PR already open: #${existing}"
            pr_number="${existing}"
            gh pr edit "${pr_number}" --repo "${GH_REPOSITORY}" --body "${body}" >/dev/null
          else
            pr_url="$(gh pr create \
              --repo "${GH_REPOSITORY}" \
              --base dev \
              --head "${BRANCH}" \
              --title "chore(release): back-merge v${VERSION} into dev" \
              --body "${body}")"
            pr_number="$(printf '%s' "${pr_url}" | sed -n 's#.*/pull/\([0-9][0-9]*\).*#\1#p')"
            echo "Opened back-merge PR #${pr_number} (${pr_url})"
          fi

          gh pr merge "${pr_number}" --repo "${GH_REPOSITORY}" --auto --merge --delete-branch=false || true
