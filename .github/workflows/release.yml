name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Build and deploy on release. Build runs only on GitHub; Netlify receives dist/.
  deploy:
    name: Deploy Release
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_APP_VERSION: ${{ needs.release-please.outputs.version }}
      - name: Upload release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-${{ needs.release-please.outputs.tag_name }}
          path: dist/
          retention-days: 90
      - name: Deploy to Netlify
        id: deploy
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ] || [ -z "$NETLIFY_SITE_ID" ]; then
            echo "Skipping Netlify deploy — NETLIFY_AUTH_TOKEN or NETLIFY_SITE_ID unset."
            echo "url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          pnpm exec netlify deploy --prod --dir=dist --json > deploy-result.json
          DEPLOY_URL=$(node -e "console.log(JSON.parse(require('fs').readFileSync('deploy-result.json','utf8')).url ?? '')")
          if [ -z "$DEPLOY_URL" ]; then
            echo "Could not read the deploy URL from netlify output:" >&2
            cat deploy-result.json >&2
            exit 1
          fi
          echo "Deployed to $DEPLOY_URL"
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      # Verify the release deploy is actually serving (version.json fresh,
      # login shell renders). Skipped when the deploy itself was skipped.
      - name: Post-deploy smoke
        if: steps.deploy.outputs.url != ''
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        run: |
          set -euo pipefail
          echo "Smoking $DEPLOY_URL"
          VERSION_JSON=$(curl -fsS --retry 3 --retry-delay 5 "$DEPLOY_URL/version.json")
          echo "version.json: $VERSION_JSON"
          BUILD_ID=$(node -e "console.log(JSON.parse(process.argv[1]).buildId ?? '')" "$VERSION_JSON")
          if [ -z "$BUILD_ID" ]; then
            echo "version.json has no buildId — deploy looks broken." >&2
            exit 1
          fi
          LOGIN_HTML=$(curl -fsS --retry 3 --retry-delay 5 "$DEPLOY_URL/login")
          echo "$LOGIN_HTML" | grep -q 'id="root"' || {
            echo "/login did not serve the app shell (SPA redirect broken?)." >&2
            exit 1
          }
          echo "Smoke OK — buildId $BUILD_ID live."
