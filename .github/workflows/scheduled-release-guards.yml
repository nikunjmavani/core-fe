# Release-flow guards — scheduled canaries that catch release-cycle drift while it
# is still a notification, not a blocked release.
#
# Single-trunk model: there is no second branch to diverge from, so the former
# branch-ancestry canary is gone. What remains:
#   • GitHub environment protection + branch ruleset drift (weekly): the
#      committed `.github/environments/*.json` must match the GitHub UI
#      (full protection diff — the Netlify deploy refuses to deploy on this
#      drift), and every committed `.github/rulesets/*.json` must still EXIST
#      on the remote (presence check — a deleted/renamed "Protect main" ruleset
#      becomes a Monday ping instead of an unprotected branch).
#      (Ruleset PARAMETER drift and secret-NAME drift stay local-only via
#      `pnpm github:sync --check` — the Actions GITHUB_TOKEN has no `secrets`
#      permission, and sync-rulesets --check compares presence, not content.)

name: Release-flow guards

on:
  schedule:
    - cron: '30 6 * * 1' # weekly (Monday) — environment protection drift
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: ${{ vars.FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 || 'true' }}

permissions:
  contents: read

concurrency:
  group: release-flow-guards
  cancel-in-progress: false

jobs:
  environment-drift:
    name: GitHub environment + ruleset drift
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 6 * * 1'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          install: 'false'

      # Both validators are plain-Node scripts (no dependencies) that compare
      # committed JSON against the GitHub API via `gh`.
      - name: Validate GitHub environment protection (config vs UI)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN || github.token }}
        run: node tooling/setup/github/check-environments-drift.mjs

      - name: Validate branch rulesets (config vs UI)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN || github.token }}
        run: node tooling/setup/github/sync-rulesets.mjs --check

  pat-canary:
    # RELEASE_PLEASE_TOKEN expiry canary — the PAT is what makes a merged Release
    # PR re-trigger post-merge CI (cut the tag/Release, deploy prod). A fine-grained
    # PAT expires; an expired/revoked one degrades SILENTLY (the release job falls
    # back to github.token, which cannot create releases). Probe it weekly so an
    # imminent/actual expiry is a Monday ping, not a stuck release day.
    name: RELEASE_PLEASE_TOKEN expiry canary
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 6 * * 1'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      # secrets.* is not readable in step `if:` — hoist presence to job env.
      HAS_PAT: ${{ secrets.RELEASE_PLEASE_TOKEN != '' }}
    steps:
      - name: Tripwire — RELEASE_PLEASE_TOKEN not provisioned
        if: env.HAS_PAT != 'true'
        run: |
          echo "::warning title=RELEASE_PLEASE_TOKEN not provisioned::No PAT set — release automation runs on the github.token fallback, which cannot cut tags/Releases. Add a PAT (repo + workflow scopes) as the RELEASE_PLEASE_TOKEN repository secret."

      - name: Probe PAT validity + expiry
        if: env.HAS_PAT == 'true'
        env:
          GH_PAT: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          set -euo pipefail
          # A valid token → 200 on /user; an expired/revoked one → 401.
          code=$(curl -sS -D /tmp/pat-headers -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${GH_PAT}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/user || echo 000)
          if [ "$code" = "401" ]; then
            echo "::error title=RELEASE_PLEASE_TOKEN invalid::The PAT returned 401 (expired or revoked). Merged Release PRs will stop cutting tags/Releases and production will not deploy. Rotate the RELEASE_PLEASE_TOKEN repository secret."
            exit 1
          fi
          if [ "$code" != "200" ]; then
            echo "::warning title=RELEASE_PLEASE_TOKEN probe inconclusive::GitHub API returned HTTP ${code} (transient?). Not failing the canary."
            exit 0
          fi
          # Fine-grained PATs return their expiry in this response header.
          exp=$(grep -i '^github-authentication-token-expiration:' /tmp/pat-headers \
            | sed -E 's/^[^:]+:[[:space:]]*//; s/[[:space:]]*$//' || true)
          if [ -z "$exp" ]; then
            echo "PAT valid (HTTP 200); no expiry header (classic PAT or non-expiring)."
            exit 0
          fi
          exp_epoch=$(date -u -d "$exp" +%s 2>/dev/null || echo 0)
          now_epoch=$(date -u +%s)
          if [ "$exp_epoch" -gt 0 ]; then
            days_left=$(( (exp_epoch - now_epoch) / 86400 ))
            echo "PAT valid; expires ${exp} (${days_left} days left)."
            if [ "$days_left" -lt 14 ]; then
              echo "::warning title=RELEASE_PLEASE_TOKEN expiring soon::The PAT expires in ${days_left} day(s) (${exp}). Rotate it before it lapses to avoid a stuck release."
            fi
          else
            echo "PAT valid; expiry header present but unparseable: ${exp}"
          fi
