name: Cross-browser smoke

# Production-build smoke on Chromium, Firefox, and WebKit (Safari engine).
# Covers login shell, PWA manifest assets, version-update toast, and toast dismiss.
# Scheduled weekly; non-blocking for PRs (same posture as Lighthouse CI).

on:
  schedule:
    - cron: '0 4 * * 3' # Every Wednesday at 4am UTC (after Lighthouse)
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: ${{ vars.FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 || 'true' }}

jobs:
  cross-browser:
    name: Playwright cross-browser
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-node-pnpm

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - run: pnpm build

      - run: pnpm test:cross-browser

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: cross-browser-failures
          path: test-results/cross-browser/
          retention-days: 14
