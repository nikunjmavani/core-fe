name: Post-merge CI

# Post-merge pipeline on protected branch pushes (dev, main).
# PR CI (pr-ci.yml) is the merge gate — same SHA already passed lint, tests, build,
# and security. Post-merge runs heavier checks + release/deploy automation.
#
# Branch → GitHub Environment mapping (only difference between dev and main):
#   dev  → development
#   main → production
#
# Flow:
#   detect changes → SBOM → unit + security → release-please (dev + main)
#   → release SBOM attach → Netlify deploy (dev + main)
#
# Playwright E2E runs locally only (needs a live core-be on :3000) — post-merge
# needs just the deployed backend URL (VITE_API_BASE_URL), never a full backend.

on:
  push:
    branches: [dev, main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: Skip post-merge Vitest suite
        required: false
        type: boolean
        default: false
      skip_deploy:
        description: Skip Netlify deploy
        required: false
        type: boolean
        default: false
      skip_release:
        description: Skip release-please
        required: false
        type: boolean
        default: false

concurrency:
  group: post-merge-ci-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: ${{ vars.FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 || 'true' }}

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      src-code: ${{ steps.filter.outputs.src-code }}
      ci-config: ${{ steps.filter.outputs.ci-config }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            src-code:
              - 'src/**'
              - 'plugins/**'
              - 'public/**'
              - 'tests/**'
              - 'tooling/**'
              - 'index.html'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'vite.config.ts'
              - 'vitest.config.ts'
              - 'playwright.config.ts'
              - 'tsconfig*.json'
            ci-config:
              - '.github/**'

  sbom:
    name: SBOM
    needs: [changes]
    permissions:
      contents: read
      id-token: write
      attestations: write
    if: needs.changes.outputs.src-code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Attest CycloneDX source SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: sbom.cyclonedx.json
          sbom-path: sbom.cyclonedx.json

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom.cyclonedx.json
          path: sbom.cyclonedx.json
          retention-days: 30

  unit-tests:
    needs: [changes, sbom]
    if: |
      always() &&
      inputs.skip_tests != true &&
      (needs.changes.outputs.src-code == 'true' || needs.changes.outputs.ci-config == 'true') &&
      (needs.sbom.result == 'success' || needs.sbom.result == 'skipped')
    uses: ./.github/workflows/reusable-vitest-unit-only.yml

  security-tests:
    name: Security tests
    needs: [changes, sbom]
    if: |
      always() &&
      inputs.skip_tests != true &&
      (needs.changes.outputs.src-code == 'true' || needs.changes.outputs.ci-config == 'true') &&
      (needs.sbom.result == 'success' || needs.sbom.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm test:security

  matrix-tests:
    name: Matrix tests gate
    needs: [unit-tests, security-tests]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Evaluate post-merge test jobs
        env:
          UNIT: ${{ needs.unit-tests.result }}
          SECURITY: ${{ needs.security-tests.result }}
        run: |
          FAILED=0
          for job in UNIT SECURITY; do
            result="${!job}"
            echo "$job=$result"
            case "$result" in
              success|skipped) ;;
              *) FAILED=1 ;;
            esac
          done
          if [ "$FAILED" -ne 0 ]; then
            echo "Post-merge test matrix failed."
            exit 1
          fi

  release-please:
    name: Release Please
    needs: [matrix-tests]
    if: |
      always() &&
      inputs.skip_release != true &&
      (needs.matrix-tests.result == 'success' || needs.matrix-tests.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # release-please creates GitHub Releases with RELEASE_PLEASE_TOKEN (a PAT with
    # the `workflow` scope; the default GITHUB_TOKEN cannot create releases here —
    # the create-a-release API path requires that scope). The token is a GitHub
    # Environment secret, so this job selects the matching environment to read it:
    # dev → development, main → production. development has no protection rules
    # (dev runs ungated), but production declares a required reviewer in
    # .github/environments/production.json, so on `main` this job — and the
    # downstream `deploy` job, which also selects production — PAUSES for manual
    # approval before it runs. That approval gate is intentional governance, not
    # a bug: a production release/deploy waits until a reviewer approves it.
    environment: ${{ github.ref_name == 'dev' && 'development' || 'production' }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
      # Some recent release-please-action paths invoke endpoints that the
      # default `GITHUB_TOKEN` cannot reach unless `id-token: write` is also
      # granted (OIDC-scoped octokit calls inside the action). Adding it here
      # is a no-op for the actual release create/update but unblocks the
      # underlying API call when the action falls into that path. Pair with
      # `actions: write` so the action can update the run's own status when
      # a release PR-creation step runs after release creation.
      id-token: write
      actions: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created == 'true' && 'true' || 'false' }}
    env:
      CHANNEL_SUFFIX: ${{ github.ref_name == 'dev' && '.dev' || '' }}
      # secrets.* is not readable in step `if:` expressions — hoist to job env.
      HAS_RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN != '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      # The github.token fallback below keeps the job green when the PAT is
      # missing, but degrades SILENTLY: auto-merged release PR merges then do
      # not re-trigger this workflow, so the tag/GitHub Release is never cut
      # on the merge commit. Surface that on every run instead of at release
      # time.
      - name: Tripwire — RELEASE_PLEASE_TOKEN not provisioned
        if: env.HAS_RELEASE_PLEASE_TOKEN != 'true'
        run: |
          echo "::warning title=RELEASE_PLEASE_TOKEN not provisioned::Release Please is running on the default GITHUB_TOKEN fallback. Release-PR auto-merge will NOT re-trigger post-merge CI, so no tag/GitHub Release is created on the merge commit. Add a PAT (repo + workflow scopes) as RELEASE_PLEASE_TOKEN to the development and production GitHub Environments."

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        with:
          # PAT (repo + workflow scopes) read from the GitHub Environment secret
          # selected by the job `environment:` above. Falls back to github.token
          # until RELEASE_PLEASE_TOKEN is provisioned (github.token cannot create
          # releases, but the fallback keeps release-PR creation working meanwhile).
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          target-branch: ${{ github.ref_name }}
          config-file: .github/release-please/config${{ env.CHANNEL_SUFFIX }}.json
          manifest-file: .github/release-please/manifest${{ env.CHANNEL_SUFFIX }}.json

      - name: Lint-fix CHANGELOGs on release PR branches
        if: steps.release.outputs.prs_created == 'true' || steps.release.outputs.pr != ''
        env:
          # PAT (not github.token) so the lint-fix commit pushed to the release PR
          # branch re-triggers the PR checks that auto-merge waits on.
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          RELEASE_PRS: ${{ steps.release.outputs.prs }}
          RELEASE_PR: ${{ steps.release.outputs.pr }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          mapfile -t branches < <(
            jq -rn --arg pr "${RELEASE_PR}" --arg prs "${RELEASE_PRS}" '
              def parse_object($raw):
                try ($raw | fromjson) catch null;
              def parse_array($raw):
                try ($raw | fromjson) catch [];
              (
                [parse_object($pr) | .headBranchName // .headRefName // empty] +
                [parse_array($prs)[] | .headBranchName // .headRefName // empty]
              )
              | map(select(. != null and . != ""))
              | unique
              | .[]
            '
          )

          if [ "${#branches[@]}" -eq 0 ]; then
            echo "No release PR branches to lint-fix."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for branch in "${branches[@]}"; do
            echo "::group::Lint-fix CHANGELOG on ${branch}"
            git fetch origin "${branch}" --depth=2
            git checkout -B "${branch}" "origin/${branch}"
            # Repo config (.markdownlint-cli2.jsonc) is auto-discovered. Both
            # changelogs are in its ignores today, so this is a no-op safety net
            # that only bites if changelogs re-enter the docs-lint surface —
            # without it, a lint-dirty generated CHANGELOG would wedge the
            # release PR's docs lane and auto-merge would wait forever.
            npx --yes markdownlint-cli2@0.22.1 \
              --fix \
              'CHANGELOG*.md' || true
            if [ -n "$(git status --porcelain CHANGELOG*.md 2>/dev/null)" ]; then
              git add CHANGELOG*.md
              git commit -m "chore(docs): lint-fix CHANGELOG after release-please"
              git push origin "${branch}"
              echo "Pushed CHANGELOG lint-fix to ${branch}"
            else
              echo "${branch} CHANGELOG already lint-clean."
            fi
            echo "::endgroup::"
          done

      - name: Enable auto-merge on release PRs
        # Use the PAT (not github.token) so the eventual auto-merge of the release
        # PR is attributed to the PAT and its push to dev/main RE-TRIGGERS this
        # workflow. A merge performed with the default GITHUB_TOKEN does not start
        # a new workflow run, so the Release Please job would never run on the
        # merge commit and the tag / GitHub Release would never be created.
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          RELEASE_PR: ${{ steps.release.outputs.pr }}
          RELEASE_PRS: ${{ steps.release.outputs.prs }}
          TARGET_BRANCH: ${{ github.ref_name }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          pr_numbers_from_outputs="$(
            jq -rn --arg pr "${RELEASE_PR}" --arg prs "${RELEASE_PRS}" '
              def parse_object($raw):
                try ($raw | fromjson) catch null;
              def parse_array($raw):
                try ($raw | fromjson) catch [];
              (
                [parse_object($pr) | .number // empty] +
                [parse_array($prs)[] | .number // empty]
              )
              | map(select(. != null))
              | unique
              | .[]
            '
          )"

          pr_numbers_from_api="$(
            gh pr list \
              --repo "${GH_REPOSITORY}" \
              --state open \
              --base "${TARGET_BRANCH}" \
              --search 'head:release-please--branches--' \
              --json number \
              --jq '.[].number'
          )"

          pr_numbers="$(printf '%s\n%s\n' "${pr_numbers_from_outputs}" "${pr_numbers_from_api}" | awk 'NF' | sort -u)"

          if [ -z "${pr_numbers}" ]; then
            echo "No open release PRs to auto-merge."
            exit 0
          fi

          for pr_number in ${pr_numbers}; do
            echo "Enabling auto-merge for release PR #${pr_number}"
            gh pr merge "${pr_number}" --auto --merge --delete-branch=false
          done

  release-sbom:
    name: Release SBOM
    needs: [sbom, release-please]
    if: |
      always() &&
      needs.release-please.outputs.releases_created == 'true' &&
      needs.sbom.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Resolve release tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          expected_prerelease="${{ github.ref_name == 'dev' && 'true' || 'false' }}"
          tag_name="$(
            gh release list \
              --repo "${GH_REPOSITORY}" \
              --limit 20 \
              --json tagName,isPrerelease \
              --jq "[.[] | select((.isPrerelease | tostring) == \"${expected_prerelease}\")][0].tagName // \"\""
          )"
          if [ -z "${tag_name}" ] || [ "${tag_name}" = "null" ]; then
            echo "::error::No GitHub Release found after release-please."
            exit 1
          fi
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "Attaching SBOM to release ${tag_name}"

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sbom.cyclonedx.json
          path: .

      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          files: sbom.cyclonedx.json
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

  dispatch-post-release-backmerge:
    name: Dispatch post-release back-merge
    needs: [release-please, deploy]
    if: |
      always() &&
      github.ref_name == 'main' &&
      needs.release-please.outputs.releases_created == 'true' &&
      needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
      contents: read
    steps:
      - name: Resolve stable release version
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag_name="$(
            gh release list \
              --repo "${GH_REPOSITORY}" \
              --limit 20 \
              --json tagName,isPrerelease \
              --jq '[.[] | select(.isPrerelease == false)][0].tagName // ""'
          )"
          if [ -z "${tag_name}" ] || [ "${tag_name}" = "null" ]; then
            echo "::error::No stable GitHub Release found after release-please."
            exit 1
          fi
          version="${tag_name#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Dispatching post-release back-merge for ${tag_name}"

      - name: Dispatch back-merge workflow
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          gh workflow run post-release-backmerge.yml \
            --repo "${GH_REPOSITORY}" \
            --ref main \
            --field "version=${VERSION}"

  deploy:
    name: Deploy
    needs: [matrix-tests, release-please, release-sbom]
    if: |
      always() &&
      inputs.skip_deploy != true &&
      (needs.matrix-tests.result == 'success' || needs.matrix-tests.result == 'skipped') &&
      (needs.release-please.result == 'success' || needs.release-please.result == 'skipped') &&
      (needs.release-sbom.result == 'success' || needs.release-sbom.result == 'skipped')
    uses: ./.github/workflows/reusable-netlify-deploy.yml
    secrets: inherit
    with:
      target_branch: ${{ github.ref_name }}
      github_environment: ${{ github.ref_name == 'dev' && 'development' || 'production' }}
      upload-release-artifact: ${{ needs.release-please.outputs.releases_created == 'true' }}

  notify-failure:
    name: Notify failure
    needs: [matrix-tests, release-please, deploy, dispatch-post-release-backmerge]
    if: |
      always() &&
      (
        needs.matrix-tests.result == 'failure' ||
        needs.release-please.result == 'failure' ||
        needs.deploy.result == 'failure' ||
        needs.dispatch-post-release-backmerge.result == 'failure'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Emit post-merge failure notice
        env:
          TESTS_RESULT: ${{ needs.matrix-tests.result }}
          RELEASE_RESULT: ${{ needs.release-please.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          BACKMERGE_RESULT: ${{ needs.dispatch-post-release-backmerge.result }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          echo "::error title=Post-merge CI failed::tests=${TESTS_RESULT} release=${RELEASE_RESULT} deploy=${DEPLOY_RESULT} backmerge=${BACKMERGE_RESULT} — ${WORKFLOW_URL}"
