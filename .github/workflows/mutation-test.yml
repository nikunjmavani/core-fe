name: Mutation Test (Stryker)

# Weekly mutation-score check over the pure runtime logic (rbac, auth, tenancy,
# route helpers — the `mutate` list in stryker.config.json). Scheduled and
# non-blocking: a failing run is a signal that tests assert too little, not a
# merge gate. Thresholds (break: 70) live in stryker.config.json.

on:
  schedule:
    - cron: '0 5 * * 1' # Every Monday 05:00 UTC (heaviest job; own slot before the guards)
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: ${{ vars.FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 || 'true' }}

jobs:
  mutation:
    name: Stryker Mutation Testing
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup-node-pnpm

      # Stryker is installed ad-hoc (too heavy for a regular devDependency);
      # configuration lives in stryker.config.json.
      - run: pnpm add -D @stryker-mutator/core @stryker-mutator/vitest-runner

      - run: pnpm exec stryker run

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: stryker-report
          path: reports/mutation/
          retention-days: 30
