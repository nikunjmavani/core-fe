name: Docs lane

# Lint and link-check markdown only when a PR touches markdown files.
# Separate workflow so code-only PRs do not show this lane as "Skipped".

on:
  pull_request:
    branches: [main, dev]
    paths:
      - '**/*.md'
      - '.markdownlint.json'
      - '.markdownlint-cli2.jsonc'
      - 'docs/**'

concurrency:
  group: pr-docs-lane-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: ${{ vars.FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 || 'true' }}

jobs:
  markdown:
    name: Markdown lint + links
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Collect changed markdown files
        id: changed-markdown
        run: |
          set -euo pipefail
          files="$(git diff --name-only --diff-filter=ACMRT \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" \
            -- '*.md' || true)"
          if [ -z "${files}" ]; then
            echo "has-files=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          {
            echo "has-files=true"
            echo "files<<EOF"
            echo "${files}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Node and pnpm
        if: steps.changed-markdown.outputs.has-files == 'true'
        uses: ./.github/actions/setup-node-pnpm

      - name: Lint changed markdown (markdownlint-cli2 via pnpm docs:lint)
        if: steps.changed-markdown.outputs.has-files == 'true'
        run: pnpm docs:lint

      - name: Check links in changed markdown files (lychee)
        if: steps.changed-markdown.outputs.has-files == 'true'
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          args: >-
            --no-progress
            --max-redirects 5
            --accept 200,204,206,429
            ${{ steps.changed-markdown.outputs.files }}
          fail: false
          failIfEmpty: false
