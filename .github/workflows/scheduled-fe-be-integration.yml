name: Scheduled FE ↔ BE integration

# Nightly: core-be + contract drift + full Playwright E2E (`*.e2e.test.ts`).
# PR CI uses the same E2E reusable workflow (core-be required — no skip path).

on:
  schedule:
    - cron: '0 4 * * 2' # Tuesday 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fe-be-integration
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: ${{ vars.FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 || 'true' }}
  NODE_ENV: test
  LOG_LEVEL: warn
  HOST: 0.0.0.0
  PORT: 3000
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/core
  REDIS_URL: redis://localhost:6379
  CORE_BE_DIR: ${{ github.workspace }}/core-be
  CONTRACT_DRIFT_REQUIRED: '1'
  CI: true

jobs:
  integration:
    name: core-be contracts + Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:17.10-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: core
        options: >-
          --health-cmd="pg_isready -U postgres -d core"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

      redis:
        image: redis:8.6.3-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout core-fe
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Setup Node and pnpm (core-fe)
        uses: ./.github/actions/setup-node-pnpm

      - name: Start core-be
        uses: ./.github/actions/setup-core-be

      - name: API contract drift (path-level)
        run: pnpm contracts:drift

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Build core-fe
        run: pnpm build

      - name: Playwright E2E
        run: pnpm test:e2e

      - name: Install Playwright browsers (integration cross-browser)
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Playwright routes integration (Chromium + Firefox + WebKit)
        run: pnpm test:e2e:integration:cross-browser

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-integration-report
          path: test-results/
          retention-days: 14
