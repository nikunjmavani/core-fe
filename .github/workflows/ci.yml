name: CI

# Fast merge gate, mirroring core-be's pr-ci shape: a `changes` path-filter job
# feeds every lane, docs-only PRs short-circuit to the aggregate gate, all code
# lanes run in parallel off the shared composite setup action, and a single
# `quality-gate` job (if: always()) is the ONE required status check — it
# passes when every lane succeeded or was legitimately skipped.
#
# Third-party actions are pinned to commit SHAs (same pins as core-be).

on:
  pull_request:
    branches: [main, dev, qa]
  push:
    branches: [main, dev, qa]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: ${{ vars.FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 || 'true' }}

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      src-code: ${{ steps.filter.outputs.src-code }}
      e2e: ${{ steps.filter.outputs.e2e }}
      ci-config: ${{ steps.filter.outputs.ci-config }}
      docs: ${{ steps.filter.outputs.docs-only-md }}
      docs-only: ${{ steps.filter.outputs.docs-only-md == 'true' && steps.filter.outputs.src-code == 'false' && steps.filter.outputs.e2e == 'false' && steps.filter.outputs.ci-config == 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1

      - name: Path filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            src-code:
              - 'src/**'
              - 'plugins/**'
              - 'public/**'
              - 'tests/**'
              - 'scripts/**'
              - 'index.html'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'vite.config.ts'
              - 'vitest.config.ts'
              - 'tsconfig*.json'
              - 'biome.json'
              - 'eslint.config.mjs'
              - '.prettierrc'
              - '.env'
              - '.env.development'
              - '.env.production'
              - '.env.example'
            e2e:
              - 'src/**'
              - 'tests/e2e/**'
              - 'tests/utils/**'
              - 'playwright.config.ts'
              - 'index.html'
              - 'vite.config.ts'
              - 'package.json'
              - 'pnpm-lock.yaml'
            ci-config:
              - '.github/**'
            docs-only-md:
              - '**/*.md'
              - 'docs/**'
              - 'agent-os/**'

  # ── Quality lanes (parallel) ──

  biome:
    name: Biome
    needs: [changes]
    if: needs.changes.outputs.docs-only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm biome:check

  lint:
    name: ESLint
    needs: [changes]
    if: needs.changes.outputs.docs-only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm lint

  format:
    name: Prettier
    needs: [changes]
    if: needs.changes.outputs.docs-only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm format:check

  typecheck:
    name: TypeScript
    needs: [changes]
    if: needs.changes.outputs.docs-only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm type-check

  unit-tests:
    name: Vitest + coverage
    needs: [changes]
    if: needs.changes.outputs.docs-only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # Full history: the patch-coverage step diffs against the PR base's
          # merge-base, which a shallow clone may not contain.
          fetch-depth: 0
      - uses: ./.github/actions/setup-node-pnpm
      - name: Run unit tests with coverage (ratchet thresholds in vitest.config.ts)
        run: pnpm test:ci

      # Differential gate: changed executable lines must be ≥ 80% covered
      # (scripts/ci/check-patch-coverage.mjs). The global ratchet stops
      # regressions; this stops under-tested NEW code. Ratchet the threshold
      # toward core-be's 90 as the auth/organization modules are rebuilt.
      - name: Patch coverage (changed lines)
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "$BASE_REF" --quiet
          node scripts/ci/check-patch-coverage.mjs \
            --coverage coverage/coverage-final.json \
            --base "origin/$BASE_REF" \
            --threshold 80

      - name: Coverage summary
        if: always() && hashFiles('coverage/coverage-summary.json') != ''
        run: node scripts/ci/coverage-summary.mjs

      - name: Upload coverage artifact
        if: always() && hashFiles('coverage/lcov.info') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage
          path: |
            coverage/lcov.info
            coverage/coverage-summary.json
          retention-days: 7

  docs-lint:
    name: Docs lint
    needs: [changes]
    # Runs whenever markdown changed — including docs-only PRs (their whole point).
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm docs:lint

  validate-structure:
    name: Structure validators
    needs: [changes]
    if: needs.changes.outputs.docs-only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
      - name: Route-island structure
        run: ./scripts/validate/route-islands.sh
      - name: .env.example required vars
        run: ./scripts/validate/env-example.sh
      - name: Public assets
        run: ./scripts/validate/public-assets.sh
      # Zero-dependency node script — runs on the runner's preinstalled node,
      # no pnpm install needed in this lane.
      - name: TSDoc coverage budget
        run: node scripts/tsdoc/check-coverage.mjs

  build:
    name: Build + bundle size
    needs: [changes]
    if: needs.changes.outputs.docs-only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm build
      - run: pnpm size

      # Supply-chain inventory (CycloneDX via cdxgen — reads pnpm-lock.yaml;
      # @cyclonedx/cyclonedx-npm cannot parse pnpm's node_modules layout).
      # Artifact-only: vulnerability gating is the security-audit lane's job.
      - name: Generate SBOM
        run: pnpm sbom:generate
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom
          path: sbom.cyclonedx.json
          retention-days: 30

  # ── Security ──

  gitleaks:
    name: Gitleaks
    needs: [changes]
    # Never skipped — secrets can leak in any file type, including docs.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      # TODO: pin to a commit SHA once verified (no pin inherited from core-be).
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    name: Semgrep SAST
    needs: [changes]
    if: needs.changes.outputs.docs-only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
      - run: semgrep ci --config auto
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  security-audit:
    name: Security audit
    needs: [changes]
    if: needs.changes.outputs.docs-only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup-node-pnpm
      - name: Dependency audit (all deps)
        run: pnpm deps:audit
      - name: Production dependency audit
        run: pnpm deps:audit:prod

  dependency-review:
    name: Dependency review
    needs: [changes]
    # The action only supports pull_request events; on push it is skipped and
    # the quality gate treats skipped as pass.
    if: github.event_name == 'pull_request' && needs.changes.outputs.docs-only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0

  actionlint:
    name: Actionlint
    needs: [changes]
    if: needs.changes.outputs.docs-only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
      - name: Run actionlint
        uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12

  # ── E2E ──

  e2e:
    name: Playwright E2E
    needs: [changes]
    if: needs.changes.outputs.docs-only != 'true' && needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm build
      - run: pnpm test:e2e
        env:
          CI: true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7

  # ── Aggregate gate ──
  # The single required status check for branch protection. Passes when every
  # lane succeeded or was legitimately skipped (docs-only fast path); fails on
  # any failure or cancellation. Adding a lane = add it to `needs` + the list.
  quality-gate:
    name: Quality gate
    needs:
      [
        changes,
        biome,
        lint,
        format,
        typecheck,
        unit-tests,
        docs-lint,
        validate-structure,
        build,
        gitleaks,
        semgrep,
        security-audit,
        dependency-review,
        actionlint,
        e2e,
      ]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Evaluate lane results
        env:
          RESULTS: |
            biome=${{ needs.biome.result }}
            lint=${{ needs.lint.result }}
            format=${{ needs.format.result }}
            typecheck=${{ needs.typecheck.result }}
            unit-tests=${{ needs.unit-tests.result }}
            docs-lint=${{ needs.docs-lint.result }}
            validate-structure=${{ needs.validate-structure.result }}
            build=${{ needs.build.result }}
            gitleaks=${{ needs.gitleaks.result }}
            semgrep=${{ needs.semgrep.result }}
            security-audit=${{ needs.security-audit.result }}
            dependency-review=${{ needs.dependency-review.result }}
            actionlint=${{ needs.actionlint.result }}
            e2e=${{ needs.e2e.result }}
        run: |
          FAILED=0
          {
            echo "## Quality gate"
            echo ""
            echo "| Lane | Result |"
            echo "| --- | --- |"
          } >> "$GITHUB_STEP_SUMMARY"
          while IFS='=' read -r lane result; do
            [ -n "$lane" ] || continue
            case "$result" in
              success|skipped) icon="✅" ;;
              *) icon="❌"; FAILED=1 ;;
            esac
            echo "| $lane | $icon $result |" >> "$GITHUB_STEP_SUMMARY"
            echo "$lane: $result"
          done <<EOF
          $RESULTS
          EOF
          if [ "$FAILED" -ne 0 ]; then
            echo "Quality gate: at least one lane failed or was cancelled."
            exit 1
          fi
          echo "Quality gate: all lanes passed (or were legitimately skipped)."
