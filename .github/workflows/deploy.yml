# Build and deploy to Netlify. Build runs only on GitHub; Netlify receives pre-built dist/.
# Requires: VITE_API_BASE_URL, NETLIFY_AUTH_TOKEN, NETLIFY_SITE_ID in repo secrets.
# Optional: VITE_SENTRY_DSN, SENTRY_AUTH_TOKEN, etc.
# In Netlify: disable "Build" from Git (or use a no-op) so this is the only deploy path.

name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  gate:
    name: Check deploy secrets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - id: check
        env:
          API_URL: ${{ secrets.VITE_API_BASE_URL }}
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ -n "$API_URL" ] && [ -n "$NETLIFY_TOKEN" ] && [ -n "$NETLIFY_SITE" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Skipping deploy — one or more required secrets are unset."
          fi

  build-and-deploy:
    name: Build and deploy to Netlify
    needs: gate
    if: needs.gate.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup-node-pnpm

      - name: Build
        run: pnpm build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Deploy to Netlify
        id: deploy
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          pnpm exec netlify deploy --prod --dir=dist --json > deploy-result.json
          DEPLOY_URL=$(node -e "console.log(JSON.parse(require('fs').readFileSync('deploy-result.json','utf8')).url ?? '')")
          if [ -z "$DEPLOY_URL" ]; then
            echo "Could not read the deploy URL from netlify output:" >&2
            cat deploy-result.json >&2
            exit 1
          fi
          echo "Deployed to $DEPLOY_URL"
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      # Verify the deploy, not just the build: the live site must serve a fresh
      # version.json (the reload-on-deploy poll target) and render the login
      # entry page. Catches broken publishes, CDN misconfig, and SPA-redirect
      # regressions the build can't.
      - name: Post-deploy smoke
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        run: |
          set -euo pipefail
          echo "Smoking $DEPLOY_URL"
          VERSION_JSON=$(curl -fsS --retry 3 --retry-delay 5 "$DEPLOY_URL/version.json")
          echo "version.json: $VERSION_JSON"
          BUILD_ID=$(node -e "console.log(JSON.parse(process.argv[1]).buildId ?? '')" "$VERSION_JSON")
          if [ -z "$BUILD_ID" ]; then
            echo "version.json has no buildId — deploy looks broken." >&2
            exit 1
          fi
          LOGIN_HTML=$(curl -fsS --retry 3 --retry-delay 5 "$DEPLOY_URL/login")
          echo "$LOGIN_HTML" | grep -q 'id="root"' || {
            echo "/login did not serve the app shell (SPA redirect broken?)." >&2
            exit 1
          }
          echo "Smoke OK — buildId $BUILD_ID live."
