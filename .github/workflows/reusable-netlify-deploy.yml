name: Reusable — Netlify deploy

# Builds dist/ on GitHub Actions and publishes to Netlify.
# Reads deploy secrets from the selected GitHub Environment:
#   dev  → development (VITE_API_BASE_URL, NETLIFY_AUTH_TOKEN, NETLIFY_SITE_ID)
#   main → production
#
# ONE Netlify project ("core-fe") serves both environments via deploy contexts:
#   main → production deploy (--prod, core-fe.netlify.app)
#   dev  → alias deploy (--alias dev, dev--core-fe.netlify.app)

on:
  workflow_call:
    inputs:
      target_branch:
        description: Protected branch that received the merge (dev or main)
        required: true
        type: string
      github_environment:
        description: GitHub Environment name (development or production)
        required: true
        type: string
      upload-release-artifact:
        description: Upload dist/ as a release artifact when a release was created
        required: false
        type: boolean
        default: false
      artifact-name:
        description: Artifact name when upload-release-artifact is true
        required: false
        type: string
        default: release-dist

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: ${{ vars.FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 || 'true' }}

jobs:
  run:
    name: Netlify deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: ${{ inputs.github_environment }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Validate deploy secrets (fail loud)
        env:
          GITHUB_ENV_VALIDATION_SOURCE: runtime
          SKIP_GITHUB_ENV: '1'
          CONFIG: ${{ inputs.github_environment }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
          VITE_PRIVACY_POLICY_URL: ${{ secrets.VITE_PRIVACY_POLICY_URL }}
        run: node tooling/setup/github/validate-github-env.mjs

      - uses: ./.github/actions/setup-node-pnpm

      - name: Validate production client env (VITE_*)
        if: inputs.github_environment == 'production'
        env:
          NODE_ENV: production
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_CAPTCHA_DISABLED: ${{ vars.VITE_CAPTCHA_DISABLED }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
        run: pnpm validate:client-env --production

      - name: Resolve app version from release-please manifest
        id: version
        env:
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          set -euo pipefail
          suffix=""
          if [ "${TARGET_BRANCH}" = "dev" ]; then
            suffix=".dev"
          fi
          version="$(jq -r '."."' ".github/release-please/manifest${suffix}.json")"
          echo "vite_app_version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: pnpm build
        # Every VITE_* value the client bundle needs at runtime must be present
        # HERE — `pnpm build` bakes `import.meta.env.VITE_*` into the bundle.
        # Passing them only to the validate step above is not enough: the app
        # reads them at boot and `validatePlatformInvariantsAtBoot` throws a
        # white-screen error in production when e.g. VITE_CAPTCHA_DISABLED is
        # absent and no VITE_TURNSTILE_SITE_KEY is set. Keep this list in sync
        # with the validate step and tooling/setup/github/validate-github-env.mjs.
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_APP_VERSION: ${{ steps.version.outputs.vite_app_version }}
          VITE_CAPTCHA_DISABLED: ${{ vars.VITE_CAPTCHA_DISABLED }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
          VITE_PRIVACY_POLICY_URL: ${{ secrets.VITE_PRIVACY_POLICY_URL }}
          VITE_CSP_REPORT_URI: ${{ secrets.VITE_CSP_REPORT_URI }}

      - name: Upload release artifact
        if: inputs.upload-release-artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ inputs.artifact-name }}
          path: dist/
          retention-days: 90

      - name: Deploy to Netlify
        id: deploy
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          GITHUB_ENVIRONMENT: ${{ inputs.github_environment }}
        run: |
          if [ "$GITHUB_ENVIRONMENT" = "production" ]; then
            DEPLOY_FLAGS="--prod"
          else
            DEPLOY_FLAGS="--alias dev"
          fi
          # shellcheck disable=SC2086 # DEPLOY_FLAGS is two words by design
          pnpm exec netlify deploy $DEPLOY_FLAGS --dir=dist --json > deploy-result.json
          DEPLOY_URL=$(node -e "const r=JSON.parse(require('fs').readFileSync('deploy-result.json','utf8')); console.log(r.url ?? r.deploy_url ?? '')")
          if [ -z "$DEPLOY_URL" ]; then
            echo "Could not read the deploy URL from netlify output:" >&2
            cat deploy-result.json >&2
            exit 1
          fi
          echo "Deployed to $DEPLOY_URL (${{ inputs.github_environment }})"
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Post-deploy smoke
        if: steps.deploy.outputs.url != ''
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        run: |
          set -euo pipefail
          echo "Smoking $DEPLOY_URL"
          VERSION_JSON=$(curl -fsS --retry 3 --retry-delay 5 "$DEPLOY_URL/version.json")
          echo "version.json: $VERSION_JSON"
          BUILD_ID=$(node -e "console.log(JSON.parse(process.argv[1]).buildId ?? '')" "$VERSION_JSON")
          if [ -z "$BUILD_ID" ]; then
            echo "version.json has no buildId — deploy looks broken." >&2
            exit 1
          fi
          LOGIN_HTML=$(curl -fsS --retry 3 --retry-delay 5 "$DEPLOY_URL/login")
          echo "$LOGIN_HTML" | grep -q 'id="root"' || {
            echo "/login did not serve the app shell (SPA redirect broken?)." >&2
            exit 1
          }
          echo "Smoke OK — buildId $BUILD_ID live."
