name: Reusable — Netlify deploy

# Builds dist/ on GitHub Actions and publishes to Netlify.
# Reads deploy secrets from the selected GitHub Environment:
#   dev  → development (VITE_API_BASE_URL, NETLIFY_AUTH_TOKEN, NETLIFY_SITE_ID)
#   main → production
#
# ONE Netlify project ("core-fe") serves both environments via deploy contexts:
#   main → production deploy (--prod, core-fe.netlify.app)
#   dev  → alias deploy (--alias dev, dev--core-fe.netlify.app)
#
# Two ways in (parity with core-be's reusable-railway-deploy.yml):
#   - workflow_call  — post-merge-ci passes target_branch + github_environment
#   - workflow_dispatch — deploy on demand: pick the branch in the Actions "Run
#     workflow" dropdown (→ github.ref_name) and the `target` environment. Lets
#     you re-publish after an env-var change / hotfix / rollback without the full
#     test + release-please pipeline. The production environment's required
#     reviewer still gates a manual prod deploy, so governance is preserved.

on:
  workflow_call:
    inputs:
      target_branch:
        description: Protected branch that received the merge (dev or main)
        required: true
        type: string
      github_environment:
        description: GitHub Environment name (development or production)
        required: true
        type: string
      upload-release-artifact:
        description: Upload dist/ as a release artifact when a release was created
        required: false
        type: boolean
        default: false
      artifact-name:
        description: Artifact name when upload-release-artifact is true
        required: false
        type: string
        default: release-dist
  workflow_dispatch:
    inputs:
      target:
        description: GitHub Environment to deploy
        required: true
        type: choice
        options:
          - production
          - development

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: ${{ vars.FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 || 'true' }}

# Serialize deploys per environment so a manual (workflow_dispatch) deploy can
# never clobber an in-flight release deploy to the same target — it queues.
concurrency:
  group: netlify-deploy-${{ inputs.target || inputs.github_environment }}
  cancel-in-progress: false

jobs:
  resolve-environment:
    name: Resolve deploy target
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      environment: ${{ steps.map.outputs.environment }}
      target_branch: ${{ steps.map.outputs.target_branch }}
    steps:
      - id: map
        env:
          # `github.event_name` LEAKS into a called reusable as the CALLER's
          # event (e.g. 'workflow_dispatch' when post-merge-ci was itself
          # dispatched), so only trust `target` when it is actually set —
          # otherwise fall back to the workflow_call inputs. Same guard core-be
          # documents in reusable-railway-deploy.yml.
          EVENT_NAME: ${{ github.event_name }}
          TARGET_INPUT: ${{ inputs.target }}
          GH_ENV_INPUT: ${{ inputs.github_environment }}
          TARGET_BRANCH_INPUT: ${{ inputs.target_branch }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$TARGET_INPUT" ]; then
            # Manual deploy: environment from the `target` input, branch from the
            # Actions "Run workflow" dropdown selection (github.ref_name).
            environment="$TARGET_INPUT"
            branch="$REF_NAME"
          elif [ -n "$GH_ENV_INPUT" ]; then
            # Called from post-merge-ci.
            environment="$GH_ENV_INPUT"
            branch="$TARGET_BRANCH_INPUT"
          else
            echo "::error::Could not resolve a deploy environment (no dispatch target and no github_environment input)."
            exit 1
          fi
          case "$environment" in
            production | development) ;;
            *) echo "::error::Unsupported environment: $environment" && exit 1 ;;
          esac
          echo "environment=$environment" >> "$GITHUB_OUTPUT"
          echo "target_branch=$branch" >> "$GITHUB_OUTPUT"
          echo "Resolved deploy target: environment=$environment branch=$branch (event=$EVENT_NAME)"

  run:
    name: Netlify deploy (${{ needs.resolve-environment.outputs.environment }})
    needs: resolve-environment
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: ${{ needs.resolve-environment.outputs.environment }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Validate deploy secrets (fail loud)
        env:
          GITHUB_ENV_VALIDATION_SOURCE: runtime
          SKIP_GITHUB_ENV: '1'
          CONFIG: ${{ needs.resolve-environment.outputs.environment }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
          VITE_PRIVACY_POLICY_URL: ${{ secrets.VITE_PRIVACY_POLICY_URL }}
        run: node tooling/setup/github/validate-github-env.mjs

      - uses: ./.github/actions/setup-node-pnpm

      # Runs for BOTH environments so each is checked against its own strict
      # profile (required + forbidden + allowed value sets). The diagnostics
      # flags are exposed so the per-environment `allowed` check can enforce them
      # (e.g. production rejects VITE_DEBUG_LOGGING=true).
      - name: Validate client env (VITE_*)
        env:
          DEPLOY_ENV: ${{ needs.resolve-environment.outputs.environment }}
          NODE_ENV: ${{ needs.resolve-environment.outputs.environment }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_CAPTCHA_DISABLED: ${{ vars.VITE_CAPTCHA_DISABLED }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
          VITE_DEBUG_LOGGING: ${{ vars.VITE_DEBUG_LOGGING }}
          VITE_DEVTOOLS: ${{ vars.VITE_DEVTOOLS }}
          VITE_E2E_HOOKS: ${{ vars.VITE_E2E_HOOKS }}
          VITE_VERSION_CHECK: ${{ vars.VITE_VERSION_CHECK }}
        run: pnpm validate:client-env --env "$DEPLOY_ENV"

      - name: Resolve app version from release-please manifest
        id: version
        env:
          TARGET_BRANCH: ${{ needs.resolve-environment.outputs.target_branch }}
        run: |
          set -euo pipefail
          suffix=""
          if [ "${TARGET_BRANCH}" = "dev" ]; then
            suffix=".dev"
          fi
          version="$(jq -r '."."' ".github/release-please/manifest${suffix}.json")"
          echo "vite_app_version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build
        # Vite bakes `import.meta.env.VITE_*` into the client bundle from `.env`
        # FILES — bare `process.env.VITE_*` (a workflow `env:` block) is NOT
        # reliably exposed to `import.meta.env` in CI, and all `.env*` files are
        # gitignored so none exist on a fresh checkout. So materialize the
        # deploy-provided client env into `.env.production.local` (highest Vite
        # precedence, gitignored, never uploaded — we deploy `--dir=dist`) before
        # building. Without this the app booted with VITE_CAPTCHA_DISABLED unset
        # and VITE_API_BASE_URL blank → `validatePlatformInvariantsAtBoot` threw
        # a white-screen error. Keep this list in sync with the validate step and
        # tooling/setup/github/validate-github-env.mjs.
        run: |
          : > .env.production.local
          for key in VITE_API_BASE_URL VITE_APP_VERSION VITE_CAPTCHA_DISABLED \
            VITE_TURNSTILE_SITE_KEY VITE_POSTHOG_KEY VITE_POSTHOG_HOST \
            VITE_PRIVACY_POLICY_URL VITE_CSP_REPORT_URI; do
            value="${!key}"
            if [ -n "$value" ]; then
              printf '%s=%s\n' "$key" "$value" >> .env.production.local
            fi
          done
          echo "Materialized $(grep -c = .env.production.local) client env keys for the build."
          pnpm build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_APP_VERSION: ${{ steps.version.outputs.vite_app_version }}
          VITE_CAPTCHA_DISABLED: ${{ vars.VITE_CAPTCHA_DISABLED }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
          VITE_PRIVACY_POLICY_URL: ${{ secrets.VITE_PRIVACY_POLICY_URL }}
          VITE_CSP_REPORT_URI: ${{ secrets.VITE_CSP_REPORT_URI }}

      - name: Upload release artifact
        if: inputs.upload-release-artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ inputs.artifact-name }}
          path: dist/
          retention-days: 90

      - name: Deploy to Netlify
        id: deploy
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          GITHUB_ENVIRONMENT: ${{ needs.resolve-environment.outputs.environment }}
        run: |
          if [ "$GITHUB_ENVIRONMENT" = "production" ]; then
            DEPLOY_FLAGS="--prod"
          else
            DEPLOY_FLAGS="--alias dev"
          fi
          # shellcheck disable=SC2086 # DEPLOY_FLAGS is two words by design
          pnpm exec netlify deploy $DEPLOY_FLAGS --dir=dist --json > deploy-result.json
          DEPLOY_URL=$(node -e "const r=JSON.parse(require('fs').readFileSync('deploy-result.json','utf8')); console.log(r.url ?? r.deploy_url ?? '')")
          if [ -z "$DEPLOY_URL" ]; then
            echo "Could not read the deploy URL from netlify output:" >&2
            cat deploy-result.json >&2
            exit 1
          fi
          echo "Deployed to $DEPLOY_URL (${{ needs.resolve-environment.outputs.environment }})"
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Post-deploy smoke
        if: steps.deploy.outputs.url != ''
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        run: |
          set -euo pipefail
          echo "Smoking $DEPLOY_URL"
          VERSION_JSON=$(curl -fsS --retry 3 --retry-delay 5 "$DEPLOY_URL/version.json")
          echo "version.json: $VERSION_JSON"
          BUILD_ID=$(node -e "console.log(JSON.parse(process.argv[1]).buildId ?? '')" "$VERSION_JSON")
          if [ -z "$BUILD_ID" ]; then
            echo "version.json has no buildId — deploy looks broken." >&2
            exit 1
          fi
          LOGIN_HTML=$(curl -fsS --retry 3 --retry-delay 5 "$DEPLOY_URL/login")
          echo "$LOGIN_HTML" | grep -q 'id="root"' || {
            echo "/login did not serve the app shell (SPA redirect broken?)." >&2
            exit 1
          }
          echo "Smoke OK — buildId $BUILD_ID live."
