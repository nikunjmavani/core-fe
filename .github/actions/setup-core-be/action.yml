name: Setup and start core-be
description: Checkout core-be, migrate, build, and start the API on port 3000 (job must provide postgres + redis services).

inputs:
  core-be-ref:
    description: Git ref for nikunjmavani/core-be
    required: false
    default: dev
  allowed-origins:
    description: CORS allowed origins for core-be test env
    required: false
    default: http://localhost:5173

runs:
  using: composite
  steps:
    - name: Checkout core-be
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        repository: nikunjmavani/core-be
        path: core-be
        ref: ${{ inputs.core-be-ref }}
        fetch-depth: 1

    - name: Install core-be dependencies
      shell: bash
      working-directory: core-be
      run: |
        corepack enable
        pnpm install --frozen-lockfile

    - name: Export core-be CI test env
      uses: ./core-be/.github/actions/test-env
      with:
        allowed-origins: ${{ inputs.allowed-origins }}
        rate-limit-max: '10000'
        rate-limit-window-ms: '60000'

    - name: Migrate core-be database
      shell: bash
      working-directory: core-be
      run: pnpm db:migrate

    - name: Seed core-be reference data (permissions + billing plans)
      shell: bash
      working-directory: core-be
      run: pnpm db:seed

    - name: Build core-be
      shell: bash
      working-directory: core-be
      run: pnpm build

    - name: Start core-be API
      shell: bash
      working-directory: core-be
      run: |
        pnpm start &
        for i in $(seq 1 60); do
          if curl -sf http://localhost:3000/readyz >/dev/null; then
            echo "core-be ready"
            exit 0
          fi
          sleep 2
        done
        echo "::error::core-be /readyz did not become ready in time"
        exit 1
