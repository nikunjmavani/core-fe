name: Setup Node and pnpm
description: Install pnpm, Node from .nvmrc, and project dependencies

inputs:
  install:
    description: Run pnpm install --frozen-lockfile
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Enable Corepack
      run: corepack enable
      shell: bash

    - name: Setup pnpm
      uses: pnpm/action-setup@ac6db6d3c1f721f886538a378a2d73e85697340a # v6

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version-file: .nvmrc
        cache: ${{ inputs.install == 'true' && 'pnpm' || '' }}

    - name: Install dependencies
      if: inputs.install == 'true'
      run: pnpm install --frozen-lockfile
      shell: bash
